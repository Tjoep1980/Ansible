---
# Update, upgrade en (indien nodig) reboot van alle apt-hosts.
# Draait als root via become; wacht netjes tot de apt/dpkg-lock vrij is
# zodat unattended-upgrades geen roet in het eten gooit.
#
# serial: 1  -> hosts worden één voor één afgehandeld, zodat nooit
#               al je machines tegelijk herstarten.
- name: apt update, upgrade en reboot
  hosts: all
  become: true
  become_user: root
  gather_facts: false
  serial: 1

  tasks:
    - name: Wacht tot apt/dpkg-lock vrij is
      ansible.builtin.shell: |
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
      changed_when: false

    - name: Apt cache bijwerken (apt update)
      ansible.builtin.apt:
        update_cache: true
        lock_timeout: 300

    - name: Pakketten upgraden (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        lock_timeout: 300

    - name: Overbodige pakketten opruimen (autoremove)
      ansible.builtin.apt:
        autoremove: true
        autoclean: true

    - name: Controleer of een reboot nodig is
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot host als dat nodig is
      ansible.builtin.reboot:
        msg: "Reboot door Ansible na dist-upgrade"
        reboot_timeout: 600          # max 10 min wachten tot host weer online is
        post_reboot_delay: 15
      when: reboot_required.stat.exists

    - name: Meld status
      ansible.builtin.debug:
        msg: >-
          {{ 'Host is herstart na upgrade.' if reboot_required.stat.exists
             else 'Geen reboot nodig.' }}
